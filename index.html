<!doctype html>

<html lang="en">
<head>

    <title>3D Testing</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link type="text/css" rel="stylesheet" href="css/styles.css">
</head>

<body>
    <script type="module">
        import * as THREE from 'https://threejs.org/build/three.module.js';
        import { STLLoader } from 'https://threejs.org/examples/jsm/loaders/STLLoader.js';
        let camera, scene, renderer;

        const mouse = new THREE.Vector2();
        const target = new THREE.Vector2();
        const windowHalf = new THREE.Vector2( window.innerWidth / 2, window.innerHeight / 2 );

        init();
        animate();

        function init() {

        camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 0.1, 500 );
        camera.position.z = 8;

        scene = new THREE.Scene();
        scene.background = new THREE.Color( 0x292929 );
        const loader = new STLLoader();
        loader.load(
            // resource URL
            'assets/room.stl',
            // called when resource is loaded
            function ( object ) {

                const wireframe = new THREE.WireframeGeometry( object );
                const lines = new THREE.LineSegments( wireframe );
                lines.material.color.setHex( 0xf7cd60 );
                lines.material.depthTest = false;
                lines.material.opacity = 0.25;
                lines.material.transparent = true;

                scene.add(lines);
                scene.add(object);

            },
            // called when loading is in progresses
            function ( xhr ) {

                console.log( ( xhr.loaded / xhr.total * 100 ) + '% loaded' );

            },
            // called when loading has errors
            function ( error ) {

                console.log( 'An error happened' );

            }
        );

        renderer = new THREE.WebGLRenderer( { antialias: true } );
        renderer.setSize( window.innerWidth, window.innerHeight );
        document.body.appendChild( renderer.domElement );

        document.addEventListener( 'mousemove', onMouseMove, false );
        document.addEventListener( 'wheel', onMouseWheel, false );
        window.addEventListener( 'resize', onResize, false );

        }

        function onMouseMove( event ) {

        mouse.x = ( event.clientX - windowHalf.x );
        mouse.y = ( event.clientY - windowHalf.y );

        }

        function onMouseWheel( event ) {

        camera.position.z += event.deltaY * 0.1; // move camera along z-axis

        }

        function onResize( event ) {

        const width = window.innerWidth;
        const height = window.innerHeight;

        windowHalf.set( width / 2, height / 2 );

        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize( width, height );
                    
        }

        function animate() {

        target.x = ( 1 - mouse.x ) * 0.002;
        target.y = ( 1 - mouse.y ) * 0.002;

        camera.rotation.x += 0.05 * ( target.y - camera.rotation.x );
        camera.rotation.y += 0.05 * ( target.x - camera.rotation.y );

        requestAnimationFrame( animate );
        renderer.render( scene, camera );

        }

    </script>
</body>
</html>
